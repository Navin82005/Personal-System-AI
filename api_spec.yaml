openapi: 3.0.3
info:
  title: Personal System AI
  description: API for document scanning, indexing, and RAG-based querying for Personal System AI.
  version: 0.1.0
servers:
  - url: http://127.0.0.1:8000
    description: Local development server

paths:
  /scan-folder:
    post:
      summary: Scan and Index Folder
      description: |
        Starts an async folder scan/indexing job. Use the progress endpoints (REST or WebSocket)
        to track real-time progress.
      operationId: scan_folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScanRequest'
      responses:
        '200':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanJobResponse'
        '400':
          description: Bad Request (Directory not found or scan failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /progress/{job_id}:
    get:
      summary: Get Job Progress (REST fallback)
      operationId: get_progress
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current job progress payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressPayload'
        '404':
          description: Unknown job

  /progress/{job_id}/cancel:
    post:
      summary: Cancel Job
      operationId: cancel_progress
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cancel requested

  /voice/session/start:
    post:
      summary: Start LiveKit Voice Session Agent
      operationId: start_voice_session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [room_name]
              properties:
                room_name:
                  type: string
      responses:
        '200':
          description: Session started / running

  /voice/session/stop:
    post:
      summary: Stop LiveKit Voice Session Agent
      operationId: stop_voice_session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [room_name]
              properties:
                room_name:
                  type: string
      responses:
        '200':
          description: Session stopping

  /query:
    post:
      summary: Query Indexed Documents
      description: |
        Endpoint to ask questions based on indexed documents. If a specific source file is mentioned,
        the query filters specifically for that file (File-Specific Query). Otherwise, it searches globally.
      operationId: query_documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Answer response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'

  /documents:
    get:
      summary: List Indexed Documents
      description: Endpoint to list all indexed document sources and their associated metadata.
      operationId: list_documents
      responses:
        '200':
          description: List of indexed documents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListResponse'

components:
  schemas:
    ScanRequest:
      type: object
      required:
        - folder_path
      properties:
        folder_path:
          type: string
          description: Absolute path to the folder to be scanned.
          example: "/Users/naveenn/Documents/Projects/Personal System AI/test_data"

    ScanJobResponse:
      type: object
      required:
        - job_id
      properties:
        job_id:
          type: string
          example: "a7f2c9f59f9b4d49b6a8f1b0840d0f6a"

    ProgressPayload:
      type: object
      properties:
        job_id:
          type: string
        progress_percentage:
          type: integer
        current_file:
          type: string
          nullable: true
        processed_files:
          type: integer
        total_files:
          type: integer
        status:
          type: string
          example: "embedding"
        message:
          type: string
        file_chunks_done:
          type: integer
        file_chunks_total:
          type: integer
        logs:
          type: array
          items:
            type: object
            properties:
              ts:
                type: number
              message:
                type: string
              status:
                type: string

    QueryRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: The natural language question.
          example: "What does it say in architecture_notes.md?"
        top_k:
          type: integer
          description: Number of relevant chunks to retrieve.
          default: 3
          example: 3

    QueryResponse:
      type: object
      properties:
        answer:
          type: string
          description: The generated answer from the LLM.
          example: "The architecture notes state that..."
        source_file:
          type: string
          nullable: true
          description: The file name used if it was a file-specific query or top source.
          example: "architecture_notes.md"
        relevant_chunks:
          type: array
          items:
            type: string
          description: The exact document chunks used as context.

    DocumentListResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: '#/components/schemas/DocumentObject'
        total_count:
          type: integer
          example: 1

    DocumentObject:
      type: object
      properties:
        source:
          type: string
          description: The absolute file path to the source document.
          example: "/Users/naveenn/Documents/Projects/Personal System AI/test_data/architecture_notes.md"
        metadata:
          type: object
          properties:
            file_name:
              type: string
              example: "architecture_notes.md"
            file_path:
              type: string
              example: "/Users/naveenn/Documents/Projects/Personal System AI/test_data/architecture_notes.md"
            created_at:
              type: string
              example: "2026-03-14 11:52:27.273816"
            updated_at:
              type: string
              example: "2026-03-14 11:52:27.273816"
            size_bytes:
              type: integer
              example: 1024

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          example: "Error scanning folder: Path is not a valid directory."
